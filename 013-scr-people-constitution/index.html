<!DOCTYPE html>
<html>

<head>
  <title>013-scr-people-constitution</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- JQuery -->
  <script type="text/javascript" src="https://cdn.staticfile.org/jquery/3.3.1/jquery.min.js"></script>
  <!-- Echarts -->
  <script type="text/javascript" src="https://cdn.staticfile.org/echarts/4.2.1/echarts.common.min.js"></script>
  <script type="text/javascript" src="./echarts-theme.js"></script>
  <!-- Moment -->
  <script type="text/javascript" src="https://cdn.staticfile.org/moment.js/2.24.0/moment.min.js"></script>
  <style>
  </style>
</head>

<body>
  <div style="position: relative;width: 1000px;height: 600px;">
    <div id="scPeopleConstitutionCanvasContaner" style="width: 100%;height:100%"></div>
  </div>
</body>
<script>
$(document).ready(function() {
  $.getJSON('data.json', function(data) {
    showFigure(data);
  })
});

function showFigure(tableData) {
  var echData = (function(originData) {
    //排序
    originData.sort(function(a, b) {
      return b.number - a.number;
    })
    return originData;
  })(tableData);
  var myChart = echarts.init(document.getElementById('scPeopleConstitutionCanvasContaner'), 'walden');
  var option = {
    grid: {
      left: 40,
      bottom: 0,
      top: 20,
      right: 20
    },
    // tooltip: {
    //   trigger: 'item',
    //   formatter: "{{b} : {c} ({d}%)"
    // },
    label: {
      align: "left",
      formatter: "{c} / {d}% \n{b}",
      fontSize: 14,
    },
    legend: {
      type: 'scroll',
      orient: 'vertical',
      right: 20,
      top: 20,
      bottom: 20,
      data: function() {
        var arr = [];
        for (var i of echData) {
          arr.push(i.siteName);
        }
        return arr;
      }(echData),
      selected: function() {
        var selectObj = {};
        var selectN = 0;
        for (var i of echData) {
          selectN++;
          selectObj[i.siteName] = selectN > 10 ? false : true;
        }
        return selectObj;
      }(echData),
    },
    series: [{
      type: 'pie',
      radius: '75%',
      center: ['40%', '50%'],
      data: function() {
        var arr = [];
        for (var i of echData) {
          arr.push({
            name: i.siteName,
            value: i.number
          });
        }
        return arr;
      }(echData),
      itemStyle: {
        emphasis: {
          shadowBlur: 10,
          shadowOffsetX: 0,
          shadowColor: 'rgba(0, 0, 0, 0.5)'
        }
      }
    }]
  };
  // 使用刚指定的配置项和数据显示图表。
  myChart.setOption(option);
}
</script>

</html>
