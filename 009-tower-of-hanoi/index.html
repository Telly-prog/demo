<!DOCTYPE html>
<html>

<head>
  <title>009-tower-of-Hanoi</title>
  <style type="text/css">
  * {
    margin: 0;
    padding: 0;
    color: #333;
  }
  .container {
    position: relative;
    width: 800px;
    margin: 20px auto;
  }
  .clearfloat:after {
    display: block;
    clear: both;
    content: "";
    visibility: hidden;
    height: 0
  }
  .clearfloat {
    zoom: 1
  }
  .disk-item {
    position: absolute;
    height: 20px;
    border: 1px solid #f5f5f5;
    background: #40d8b6;
    box-sizing: border-box;
  }
  .disk {
    text-align: center;
    line-height: 30px;
    margin-top: 40px;
  }
  .disk input {
    color: #666;
    width: 100px;
    height: 30px;
    line-height: 30px;
    text-align: center;
    font-size: 24px;
    margin-right: 30px;
  }
  .bar {
    position: relative;
    width: 240px;
    height: 300px;
    float: left;
    bottom: -5px;
    border-bottom: 5px solid #ccc;
    text-align: center;
  }
  .bar:nth-of-type(n+2) {
    margin-left: 40px;
  }
  .bar:after {
    content: '';
    display: block;
    position: absolute;
    height: 240px;
    width: 3px;
    left: 118px;
    bottom: 0;
    background: #ccc;
  }
  #startBtn {
    width: 60px;
    height: 30px;
    line-height: 28px;
    vertical-align: bottom;
    margin-right: 10px;
  }
  #leftNumber {
    color: #ff7d02;
  }
  </style>
</head>

<body>
  <div class="container clearfloat">
    <div class="bar"><span>A</span></div>
    <div class="bar"><span>B</span></div>
    <div class="bar"><span>C</span></div>
  </div>
  <div class="disk"> 圆盘数量： <input id="diskNumber" class="number-inp" min="1" max="8" type="number" name="" value="3"><button id="startBtn">开始</button> 剩余步数： <span id="leftNumber"></span>
  </div>
  <script type="text/javascript" src="https://cdn.staticfile.org/jquery/3.4.1/jquery.min.js"></script>
  <script type="text/javascript">
  $(document).ready(function() {
    let $_diskNumber = $("#diskNumber");
    let bars; // 二维数组存放 塔柱当前圆盘
    let queue = []; //动画任务列
    let animateTime = 1000; //动画时间
    let leftNumber = 0; //剩余步数
    let queueIng = false; //动画状态
    /**
     * [初始化]
     */
    let start = () => {
      queue = [];
      $('.disk-item').stop()
      $('.disk-item').remove()
      numb = parseInt($_diskNumber.val());
      animateTime = Math.min(4500 / (numb * 3), 500);
      initDisk(numb);
      queue = move(numb, 1, 3);
      updateLeftN();
      // animate(queue.shift());
    }
    /*
     * 初始化 number数量的圆盘在A柱
     */
    let initDisk = (number) => {
      bars = [[], [], []]
      for (let i = 0; i < number; i++) {
        let $disk = $('<div></div>').addClass('disk-item');
        let width = (7 - i) * 24 + 32;
        let bottom = i * 20;
        let left = i * 12 + 20;
        $disk.css('width', width + 'px');
        $disk.css('bottom', bottom + 'px');
        $disk.css('left', left + 'px');
        $disk.attr('data-left', left);
        bars[0].push($disk)
      }
      $(".container").append(bars[0]);
    }
    /**
     * 更新剩余步数 
     */
    let updateLeftN = () => {
      leftNumber = queue.length;
      $('#leftNumber').text(leftNumber)
    }
    /**
     * 执行一次移动 从s柱 向e柱 移动一个圆盘
     * @param  {[type]} s2e [description]
     * @return {[type]}     [description]
     */
    let animate = (s2e) => {
      s2e = s2e.split('->');
      let s = parseInt(s2e[0]);
      let e = parseInt(s2e[1]);
      let item = bars[s - 1].pop();
      bars[e - 1].push(item);
      let endIndex = bars[e - 1].length - 1;
      //由三次动画合成
      item.animate({ 'bottom': '250px' }, animateTime, function() {
        item.animate({ 'left': ((e - 1) * (40 + 240) + parseInt(item.attr('data-left'))) + 'px' }, animateTime, function() {
          item.animate({ 'bottom': endIndex * 20 + 'px' }, animateTime, function() {
            callback();
          })
        })
      })

      function callback() {
        updateLeftN();
        if (queue.length) {
          animate(queue.shift())
        } else {
          queueIng = false;
        }
      }
    }
    /**
     * 移动 n 个圆盘 从 s位置到 e位置
     * 位置 1,2,3分别对应 三个塔柱
     */
    let move = (n, s, e) => {
      let otherP = [s, e].includes(1) ? ([s, e].includes(2) ? 3 : 2) : 1
      if (n == 1) {
        return [s + '->' + e];
      } else {
        return move(n - 1, s, otherP).concat(move(1, s, e)).concat(move(n - 1, otherP, e))
      }
    }
    start();
    //event  
    $_diskNumber.on('input', function() {
      start();
    })
    $("#startBtn").on('click', function() {
      if (queueIng || !queue.length) {
        start();
      }
      animate(queue.shift());
      queueIng = true;
    })
  })
  </script>
</body>

</html>
