<!DOCTYPE html>
<html>

<head>
  <title>007-twitter-volume</title>
  <!-- Vue -->
  <script type="text/javascript" src="https://cdn.staticfile.org/vue/2.6.10/vue.min.js"></script>
  <style>
    * {
    margin: 0;
    padding: 0;
  }
  .container {
    margin: 30px auto 50px;
    width: 350px;
    position: relative;
  }
  .bricks{
    position: relative;
    width: 350px;
    height: 350px;
    transform: matrix(1, 0, 0, -1, 0, 0);
  }
  .brick {
    position: absolute;
    background: #ccc;
    border: 1px solid #fff;
    box-sizing: border-box;
    border-radius: 4px;
  }
  .water{
    position: absolute;
    background: #188eee;
    border: 1px solid #fff;
    box-sizing: border-box;
    border-radius: 4px;
  }
  .brick-number {
    height: 18px;
    position: absolute;
    width: 35px;
    border:1px solid #ccc; 
    text-align: center;
  }
  </style>
</head>

<body>
  <div id="app">
    <div class="container">
      <div class="bricks">
        <template v-for="(item ,c) of brickList_">
          <template v-for="(itm,r) of new Array(item)">
            <div class="brick" :style="'width:'+length+'px;height:'+length+'px;left:'+(c*length)+'px;top:'+(r*length)+'px;'"></div>
          </template>
        </template>
        <template v-for="(item ,c) of waterList_" v-if="item">
          <template v-for="(itm,r) of new Array(item)">
            <div class="water" :style="'width:'+length+'px;height:'+length+'px;left:'+(c*length)+'px;top:'+(r*length+brickList_[c]*length)+'px;'"></div>
          </template>
        </template>
      </div>
      <template v-for="(item ,c) of brickList">
        <input @input="start()" min="0" max="10" v-model="brickList[c]" type="number" class="brick-number" :style="'left:'+(c*length)+'px;top:'+(360)+'px;'">
      </template>
    </div>
  </div>
</body>
<script>
new Vue({
  el: "#app",
  data: {
    brickList: [5, 6, 10, 2, 7, 9, 0, 1, 2, 5],
    length: 35,
    waterList: [],
  },
  methods: {
    /**
     * index s-e寻找最高砖块，l2r true:从左到右,false从右到左(默认)
     */
    findMaxLength(s, e, l2r) {
      let max = {
        v: 0,
        index: 0,
      };
      let i;
      if (l2r) {
        for (i = s; i <= e; i++) {
          if (this.brickList_[i] >= max.v) {
            max.v = this.brickList_[i];
            max.index = i;
          }
        }
      } else {
        for (i = e; i >= s; i--) {
          if (this.brickList_[i] >= max.v) {
            max.v = this.brickList_[i];
            max.index = i;
          }
        }
      }
      return max;
    },
    start() {
      this.waterList = [];
      let waterList = [];
      let brickL = this.brickList_.length;
      let max = this.findMaxLength(0, brickL - 1);
      let leftMax = Object.assign({}, max);
      let rightMax = Object.assign({}, max);

      /**
       * [s-e以L为目标高度填充水] 
       */
      let fillWater = (s, e, L) => {
        if (Math.abs(s - e) == 1) return;
        for (let i = s; i <= e; i++) {
          waterList[i] = L - this.brickList_[i]
        }
      }
      // 最高砖头向左循环填充
      do {
        let leftMax_ = this.findMaxLength(0, leftMax.index - 1);
        fillWater(leftMax_.index, leftMax.index, Math.min(leftMax.v, leftMax_.v));
        leftMax = Object.assign({}, leftMax_);
      } while (leftMax.index > 0)
      // 最高砖头向右循环填充
      do {
        let rightMax_ = this.findMaxLength(Math.min(rightMax.index + 1, brickL - 1), brickL - 1, true);
        fillWater(rightMax.index, rightMax_.index, Math.min(rightMax.v, rightMax_.v));
        rightMax = Object.assign({}, rightMax_);
      } while (rightMax.index < brickL - 1);
      this.waterList = waterList;
    }
  },
  computed: {
    brickList_() {
      return this.brickList.map((item) => parseInt(item))
    },
    waterList_() {
      return this.waterList.map((item) => Math.max(item, 0))
    }
  },
  mounted() {
    this.start();
  }
})

</script>

</html>
