<!DOCTYPE html>
<html>

<head>
  <title>002-three-torus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script type="text/javascript" src="../../assets/threejs-lib/three.js"></script>
  <style> body {
    margin: 0;
    overflow: hidden;
  }
  </style>
</head>

<body>
  <div id="WebGL-output"> </div>
  <script type="text/javascript">
  function init() {
    var outputDom = document.getElementById("WebGL-output");
    //配置基本参数
    var scene = new THREE.Scene();
    var cHeight = Math.floor(window.innerWidth * 0.54);
    outputDom.style.height = cHeight;
    var camera = new THREE.PerspectiveCamera(45, window.innerWidth / cHeight, 0.1, 1000);
    var webGLRenderer = new THREE.WebGLRenderer();
    webGLRenderer.setClearColor(new THREE.Color(0xEEEEEE, 1.0));
    webGLRenderer.setSize(window.innerWidth, cHeight);
    webGLRenderer.shadowMapEnabled = true;
    //添加模型、材质
    var knotGeometry = new THREE.TorusKnotGeometry(12, 5, 2000, 4, 6, 3, 5);
    var meshMaterial = new THREE.MeshNormalMaterial({});
    var knot = THREE.SceneUtils.createMultiMaterialObject(knotGeometry, [meshMaterial]);
    //渲染方向  
    scene.add(knot);
    camera.position.x = -30;
    camera.position.y = 40;
    camera.position.z = 50;
    camera.lookAt(new THREE.Vector3(10, 0, 0));
    outputDom.appendChild(webGLRenderer.domElement);
    var step = 0;
    render();
    //旋转
    function render() {
      knot.rotation.y = step += 0.005;
      requestAnimationFrame(render);
      webGLRenderer.render(scene, camera);
    }
  }
  window.onload = init;

  </script>
</body>

</html>
