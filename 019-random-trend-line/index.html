<!DOCTYPE html>
<html>

<head>
  <title>019-random-trend-line</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- JQuery -->
  <script type="text/javascript" src="https://cdn.staticfile.org/jquery/3.3.1/jquery.min.js"></script>
  <!-- Echarts -->
  <script type="text/javascript" src="https://cdn.staticfile.org/echarts/4.2.1/echarts.common.min.js"></script>
  <script type="text/javascript" src="./echarts-theme.js"></script>
  <!-- Moment -->
  <script type="text/javascript" src="https://cdn.staticfile.org/moment.js/2.24.0/moment.min.js"></script>
  <style>
  body {
    display: flex;
  }

  .btn-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  button {
    width: 100px;
    height: 30px;
    font-size: 16px;
    line-height: 25px;
  }

  #btn1 {
    margin-bottom: 20px;
  }

  </style>
</head>

<body>
  <div style="position: relative;width: 1000px;height: 600px;">
    <div id="canvas" style="width: 100%;height:100%"></div>
  </div>
  <div class="btn-container">
    <button id="btn1">暂停</button>
    <button id="btn2">重启</button>
  </div>
</body>
<script>
$(document).ready(function() {
  let dataUp = []
  let dataDown = []
  let dataUpInterval1 = [];
  let dataUpInterval2 = [];
  let dataDownInterval1 = [];
  let dataDownInterval2 = [];
  const option = {
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        return params[0].value[1] || params[1].value[1] || 0
      }
    },
    title: {
      left: 'center',
      text: '随机走势图',
    },
    grid: {
      left: 50,
      right: 50
    },
    toolbox: {
      feature: {
        dataZoom: {
          yAxisIndex: 'none'
        },
        restore: {},
        saveAsImage: {}
      }
    },
    xAxis: {
      type: 'category',
      boundaryGap: false,
    },
    yAxis: {
      type: 'value',
      max: (d) => (d.max + 2),
      min: (d) => (d.min - 2)
    },
    dataZoom: [{
      type: 'inside',
    }, {
      handleIcon: 'M10.7,11.9v-1.3H9.3v1.3c-4.9,0.3-8.8,4.4-8.8,9.4c0,5,3.9,9.1,8.8,9.4v1.3h1.3v-1.3c4.9-0.3,8.8-4.4,8.8-9.4C19.5,16.3,15.6,12.2,10.7,11.9z M13.3,24.4H6.7V23h6.6V24.4z M13.3,19.6H6.7v-1.4h6.6V19.6z',
      handleSize: '80%',
      handleStyle: {
        color: '#fff',
        shadowBlur: 3,
        shadowColor: 'rgba(0, 0, 0, 0.6)',
        shadowOffsetX: 2,
        shadowOffsetY: 2
      }
    }],
    series: [
      getSeriesByColor('red'),
      getSeriesByColor('green'),
      getSeriesByColor('red'),
      getSeriesByColor('red'),
      getSeriesByColor('green'),
      getSeriesByColor('green'),
    ]
  };

  function getSeriesByColor(color) {
    return {
      name: 'value',
      type: 'line',
      symbol: 'none',
      sampling: 'average',
      itemStyle: {
        color: color
      },
      data: []
    }
  }
  const myChart = echarts.init(document.getElementById('canvas'), 'walden');
  myChart.setOption(option);
  let base = +new Date();
  const oneDay = 24 * 3600 * 1000;
  let running = true;
  let current = 0;

  const domBtn1 = document.getElementById('btn1');
  const domBtn2 = document.getElementById('btn2');
  bindEvent();
  start();

  function bindEvent() {
    domBtn1.onclick = triggerPause;
    domBtn2.onclick = triggerRestart;
  }

  function triggerPause() {
    running = !running;
    domBtn1.innerText = running ? '暂停' : '继续'
  }

  function triggerRestart() {
    dataUp = [];
    dataDown = [];
    dataUpInterval1 = [];
    dataUpInterval2 = [];
    dataDownInterval1 = [];
    dataDownInterval2 = [];
    base = +new Date();
    current = 1;
    if (!running) showData();
  }


  function start() {

    if (running) showData();
    requestAnimationFrame(start);
  }

  let isUpInterval = true;
  let isDownInterval = true;

  function showData() {
    const now = new Date(base += oneDay);
    const format = ([now.getFullYear(), now.getMonth() + 1, now.getDate()].join('/'));
    const dis = Math.random() < 0.5 ? 1 : 2;
    const isPos = Math.random() >= 0.5;
    const next = isPos ? current + dis : current - dis;
    if (myChart) {
      dataUpInterval1.push([format, undefined])
      dataUpInterval2.push([format, undefined])
      dataDownInterval1.push([format, undefined])
      dataDownInterval2.push([format, undefined])
      // 上升
      if (isPos) {
        if (dataUp.length) {
          if (dataUp[dataUp.length - 1][1] == undefined) {
            if (dataDown[dataUp.length - 1][1] == undefined)
              dataUp[dataUp.length - 1][1] = dataDown[dataUp.length - 1][1];
            else {
              if (isUpInterval) {
                dataUpInterval1[dataUpInterval1.length - 2] = dataDown[dataUp.length - 1]
                dataUpInterval1[dataUpInterval1.length - 1][1] = next;
              } else {
                dataUpInterval2[dataUpInterval2.length - 2] = dataDown[dataUp.length - 1]
                dataUpInterval2[dataUpInterval2.length - 1][1] = next;
              }
              isUpInterval = !isUpInterval;
            }
          }
        }
        dataUp.push([format, next]);
        dataDown.push([format, undefined])
      } else {
        // 下降
        if (dataDown.length) {
          if (dataDown[dataDown.length - 1][1] == undefined) {
            if (dataUp[dataDown.length - 1][1] == undefined) {
              dataDown[dataDown.length - 1][1] = dataUp[dataDown.length - 1][1];
            } else {
              if (isDownInterval) {
                dataDownInterval1[dataDownInterval1.length - 2] = dataUp[dataDown.length - 1]
                dataDownInterval1[dataDownInterval1.length - 1][1] = next;
              } else {
                dataDownInterval2[dataDownInterval2.length - 2] = dataUp[dataDown.length - 1]
                dataDownInterval2[dataDownInterval2.length - 1][1] = next;
              }
              isDownInterval = !isDownInterval;
            }
          }
        }
        dataUp.push([format, undefined]);
        dataDown.push([format, next])
      }


      option.series[0].data = dataUp;
      option.series[1].data = dataDown
      option.series[2].data = dataUpInterval1
      option.series[3].data = dataUpInterval2
      option.series[4].data = dataDownInterval1;
      option.series[5].data = dataDownInterval2
      myChart.setOption(option);
      current = next;
    }
  }
});

</script>

</html>
